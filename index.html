<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detection AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            margin-bottom: 30px;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.drag-over {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-area input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-area p {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .upload-area span {
            color: #999;
            font-size: 0.9em;
        }

        .image-preview {
            margin: 20px 0;
            text-align: center;
            display: none;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-predict {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-predict:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-predict:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .btn-clear:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            display: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }

        .result.show {
            display: block;
        }

        .emotion-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .emotion-name {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .confidence {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .confidence-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            margin-top: 15px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            background: white;
            border-radius: 5px;
            transition: width 0.6s ease;
        }

        .error {
            color: #e74c3c;
            background: #ffe6e6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinner-text {
            color: #667eea;
            font-weight: 600;
        }

        .emoji {
            font-size: 4em;
            margin-bottom: 15px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 2em;
            }

            .emotion-name {
                font-size: 2.5em;
            }

            button {
                padding: 10px 15px;
                font-size: 0.95em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>😊 Emotion Detection AI</h1>
            <p>Upload a face image to detect emotions</p>
        </div>

        <div class="error" id="error"></div>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸</div>
            <p>Click to upload or drag & drop</p>
            <span>PNG, JPG, GIF or BMP (max. 10MB)</span>
            <input type="file" id="imageInput" accept="image/*">
        </div>

        <div class="image-preview" id="imagePreview">
            <img id="previewImage" src="" alt="Preview">
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="spinner-text">Analyzing emotion...</div>
        </div>

        <div class="result" id="result">
            <div class="emotion-label">Detected Emotion</div>
            <div class="emoji" id="emotionEmoji">😊</div>
            <div class="emotion-name" id="emotionName">Happy</div>
            <div class="confidence">
                Confidence: <span id="confidenceValue">0%</span>
                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill"></div>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-predict" id="predictBtn" disabled>Predict Emotion</button>
            <button class="btn-clear" id="clearBtn">Clear</button>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const imagePreview = document.getElementById('imagePreview');
        const previewImage = document.getElementById('previewImage');
        const predictBtn = document.getElementById('predictBtn');
        const clearBtn = document.getElementById('clearBtn');
        const result = document.getElementById('result');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');

        let selectedFile = null;

        // Upload area click
        uploadArea.addEventListener('click', () => {
            imageInput.click();
        });

        // File input change
        imageInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            handleFileSelect(e.dataTransfer.files[0]);
        });

        function handleFileSelect(file) {
            if (!file) return;

            // Validate file
            if (!CONFIG.SUPPORTED_IMAGE_TYPES.includes(file.type)) {
                showError('Invalid file type. Please upload PNG, JPG, GIF, or BMP');
                return;
            }

            if (file.size > CONFIG.MAX_FILE_SIZE) {
                showError('File size too large. Max 10MB allowed');
                return;
            }

            selectedFile = file;
            hideError();

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                imagePreview.style.display = 'block';
                uploadArea.style.display = 'none';
                predictBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }

        predictBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                showError('Please select an image first');
                return;
            }

            await predictEmotion();
        });

        clearBtn.addEventListener('click', () => {
            selectedFile = null;
            imageInput.value = '';
            imagePreview.style.display = 'none';
            uploadArea.style.display = 'block';
            result.classList.remove('show');
            loading.classList.remove('show');
            hideError();
            predictBtn.disabled = true;
        });

        async function predictEmotion() {
            try {
                hideError();
                loading.classList.add('show');
                result.classList.remove('show');
                predictBtn.disabled = true;

                const formData = new FormData();
                formData.append('image', selectedFile);

                // Use configuration from config.js
                const response = await fetch(CONFIG.API_PREDICT_ENDPOINT, {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Failed to predict emotion');
                }

                const data = await response.json();
                displayResult(data);

            } catch (err) {
                console.error('Error:', err);
                showError(err.message || 'Failed to predict emotion. Please try again.');
            } finally {
                loading.classList.remove('show');
                predictBtn.disabled = false;
            }
        }

        function displayResult(data) {
            const emotion = data.emotion || 'Unknown';
            const confidence = (data.confidence * 100).toFixed(2);

            document.getElementById('emotionName').textContent = emotion;
            document.getElementById('emotionEmoji').textContent = CONFIG.EMOTION_EMOJIS[emotion] || '😐';
            document.getElementById('confidenceValue').textContent = confidence + '%';
            document.getElementById('confidenceFill').style.width = confidence + '%';

            result.classList.add('show');
        }

        function showError(message) {
            error.textContent = message;
            error.classList.add('show');
        }

        function hideError() {
            error.classList.remove('show');
        }
    </script>
</body>
</html>
